# Nginx configuration for the Dashboard UI pod.
#
# Installed at /etc/nginx/conf.d/default.conf inside the UI image. It:
#   - serves the compiled Vite SPA from /usr/share/nginx/html;
#   - falls back to index.html so client-side routing works on deep links;
#   - proxies /api/* to the in-cluster Dashboard Engine Service.
#
# `dashboard-engine` is the ClusterIP Service name (port 8080) in the
# `fansfund-ops` namespace, so this hostname resolves via in-cluster DNS.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static SPA assets with client-side routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the Dashboard Engine ClusterIP Service.
    location /api/ {
        proxy_pass http://dashboard-engine:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Secret template for the Dashboard Engine.
#
# ############################################################################
# # DO NOT COMMIT REAL SECRETS. This is a TEMPLATE. Replace every value       #
# # marked <TO BE FILLED> with the real value out-of-band (e.g. `kubectl      #
# # create secret`, sealed-secrets, or an external secrets operator) and keep #
# # the populated manifest out of version control.                            #
# ############################################################################
#
# SECURITY NOTE: the Dashboard Engine exposes an UNAUTHENTICATED internal API.
# It is only reachable through the ClusterIP Service `dashboard-engine` and must
# stay cluster-internal. Only the UI is exposed (NodePort). Do not attach an
# Ingress/LoadBalancer directly to the engine.
#
# The engine reads all keys below from the environment; the engine Deployment
# injects the whole Secret via `envFrom.secretRef`.
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-engine-secrets
  namespace: fansfund-ops
type: Opaque
stringData:
  # --- Stripe -------------------------------------------------------------
  STRIPE_API_KEY: "<TO BE FILLED: Stripe secret API key>"

  # --- MongoDB ------------------------------------------------------------
  MONGODB_URI: "<TO BE FILLED: MongoDB connection string>"
  # Optional: database name. If omitted, the DB encoded in MONGODB_URI is used.
  MONGODB_DB: "<TO BE FILLED (optional): MongoDB database name>"

  # --- AWS S3 (dispute evidence) -----------------------------------------
  AWS_REGION: "<TO BE FILLED: AWS region, e.g. eu-west-2>"
  AWS_ACCESS_KEY_ID: "<TO BE FILLED: AWS access key id>"
  AWS_SECRET_ACCESS_KEY: "<TO BE FILLED: AWS secret access key>"
  # Optional: overrides the default dispute-docs bucket name.
  S3_DISPUTE_DOCS_BUCKET: "<TO BE FILLED (optional): S3 bucket for dispute docs>"
  # Optional: assume this IAM role (via STS) before accessing S3. When set, the
  # credentials above are used only to call sts:AssumeRole; leave blank to use
  # them directly. AWS_ROLE_EXTERNAL_ID is only needed for cross-account roles
  # whose trust policy requires an external id.
  AWS_ROLE_ARN: "<TO BE FILLED (optional): arn:aws:iam::<acct>:role/<role>>"
  AWS_ROLE_SESSION_NAME: "fansfund-ops-dashboard"
  AWS_ROLE_EXTERNAL_ID: "<TO BE FILLED (optional): STS external id>"

  # --- Grafana ------------------------------------------------------------
  GRAFANA_URL: "<TO BE FILLED: Grafana base URL>"
  GRAFANA_API_KEY: "<TO BE FILLED: Grafana API key / service-account token>"
  GRAFANA_DATASOURCE_UID: "<TO BE FILLED: Prometheus datasource UID>"
  GRAFANA_SERVICES: "<TO BE FILLED: comma-separated Prometheus job names>"
